apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tasks-app
  labels:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: tasks
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasks
        app.kubernetes.io/component: backend
    spec:
      restartPolicy: Always
      containers:
        - name: backend
          image: tasks-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_APP_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_APP_USER
            - name: DB_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_APP_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
