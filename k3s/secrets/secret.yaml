# Secret: Sensitive database credentials
# Purpose: Stores MongoDB root and application user credentials;
# injected as environment variables to database and backend pods.
# Note: In production, use external secret management (HashiCorp
# Vault, AWS Secrets Manager, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: tasks-app
type: Opaque
stringData:
  DB_ROOT_USER: admin
  DB_ROOT_PASSWORD: change-me
  DB_APP_USER: appuser
  DB_APP_PASSWORD: change-me
