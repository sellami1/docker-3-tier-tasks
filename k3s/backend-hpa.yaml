# HorizontalPodAutoscaler: Automatically scales the backend deployment
# based on CPU utilization
# Purpose: Maintains backend responsiveness by scaling from 2 to 5 replicas
# when CPU utilization exceeds 70%

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: tasks-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
