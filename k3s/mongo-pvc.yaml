# PersistentVolumeClaim: Requests persistent storage for MongoDB
# Purpose: Allocates 5Gi of storage for MongoDB data persistence
# using the app-local-path StorageClass

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: tasks-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: app-local-path
  resources:
    requests:
      storage: 5Gi
