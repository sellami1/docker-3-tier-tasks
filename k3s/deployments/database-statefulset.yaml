# Database StatefulSet: MongoDB instance with persistent storage
# Purpose: Provides a single MongoDB replica with stable hostname
# and persistent data via PVC and headless service.
# Storage: Uses mongo-data PVC with app-local-path StorageClass;
# init script creates app user and sample data.

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: tasks-app
  labels:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: database
spec:
  replicas: 1
  serviceName: database-headless
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: tasks
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasks
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999
      restartPolicy: Always
      containers:
        - name: database
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_ROOT_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_APP_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_APP_USER
            - name: DB_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: DB_APP_PASSWORD
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-init
              mountPath: /docker-entrypoint-initdb.d/10-init-db.sh
              subPath: 10-init-db.sh
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
        - name: mongo-init
          configMap:
            name: mongo-init-script
            defaultMode: 0555
