# Frontend Service: NodePort service exposing frontend to external traffic
# Purpose: Exposes React frontend on NodePort 30080 for external HTTP access;
# complements Ingress for DNS-based routing

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tasks-app
  labels:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
