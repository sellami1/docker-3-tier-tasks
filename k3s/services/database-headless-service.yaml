# Headless Service: Supports StatefulSet pod identity and direct pod DNS
# Purpose: Enables StatefulSet to maintain stable DNS names
# (database-0.database-headless) for each replica.

apiVersion: v1
kind: Service
metadata:
  name: database-headless
  namespace: tasks-app
  labels:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: database
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
