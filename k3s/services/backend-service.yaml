# Backend Service: Internal ClusterIP service for backend deployment.
# Purpose: Provides stable DNS name (backend.tasks-app.svc.cluster.local)
# for frontend to reach backend on port 3000.

apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: tasks-app
  labels:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tasks
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
